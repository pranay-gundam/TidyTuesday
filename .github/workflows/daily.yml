name: Daily TidyTuesday update

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-pictures \
            latexmk

      - name: Run daily pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash main_loop.sh

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add year_*/ Archive/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "daily update $(date +%-m/%-d)"
            git push
          fi

      - name: Post daily digest to GitHub issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f digest.txt ]; then
            BODY_FILE=digest.txt
          else
            BODY_FILE=/tmp/failure_digest.txt
            {
              echo "## Daily run — $(date +%Y-%m-%d)"
              echo ""
              echo "**Status:** the pipeline failed before a digest could be generated -- see the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            } > "$BODY_FILE"
          fi

          ISSUE_NUMBER=$(gh issue list --state all --limit 100 --json number,title \
            --jq '.[] | select(.title=="Daily TidyTuesday Runs") | .number' | head -n1)

          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_URL=$(gh issue create \
              --title "Daily TidyTuesday Runs" \
              --body "Tracking issue for daily automated runs. Each comment below is one day's digest.")
            ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          fi

          gh issue comment "$ISSUE_NUMBER" --body-file "$BODY_FILE"
